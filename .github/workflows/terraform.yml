name: Terraform CI/CD


on: 
  push: 
  branches: 
    - main

job: 
  Terraform:
    runs-on: ubuntu-latest

    steps: 

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicor/setup-terraform@v3

      - name: Terraform Init
        run: terraform Init
      
      - name: Terraform Validate
        run: terrafrom Validate

      - name: Terraform Plan
        run: terrafrom Plan
        